<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Save Words v4 – 雅思真经 538</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#040410;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:10px}
#root{width:100%;max-width:820px}

.gw{
  font-family:'Space Mono',monospace;
  background:linear-gradient(135deg,#060612 0%,#0b1520 50%,#060f08 100%);
  min-height:640px;border-radius:12px;overflow:hidden;
  position:relative;color:#fff;
  border:1px solid rgba(0,255,100,0.25);
}
.scan{
  position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,255,100,0.018) 3px,rgba(0,255,100,0.018) 4px);
  pointer-events:none;z-index:0;
}

/* ── HEADER ── */
.hdr{
  position:relative;z-index:10;padding:9px 14px;
  border-bottom:1px solid rgba(0,255,100,0.25);
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
}
.logo{font-size:11px;font-weight:700;color:#00ff64;letter-spacing:2px}
.spill{font-size:11px;padding:3px 10px;border:1px solid rgba(0,255,100,0.5);border-radius:20px;color:#00ff64}
.pgw{flex:1;min-width:60px;height:6px;background:rgba(255,255,255,0.12);border-radius:3px;overflow:hidden}
.pgf{height:100%;background:linear-gradient(90deg,#00ff64,#00ffaa);transition:width .4s ease;border-radius:3px}
.hvs{display:flex;gap:4px}
.ht{font-size:15px;filter:drop-shadow(0 0 5px #ff4466);transition:opacity .3s}
.mute-btn{
  font-size:16px;background:none;
  border:1px solid rgba(0,255,100,0.35);border-radius:6px;
  padding:2px 8px;cursor:pointer;color:#00ff64;
  transition:all .2s;line-height:1;
}
.mute-btn:hover{border-color:#00ff64;background:rgba(0,255,100,0.1)}

/* ── BODY: side-by-side on desktop ── */
.body{display:flex;position:relative;z-index:1;min-height:560px}

/* ── FALL ZONE (left ~40%) ── */
.fz{
  width:40%;
  border-right:1px solid rgba(0,255,100,0.18);
  min-height:560px;position:relative;
  display:flex;flex-direction:column;align-items:center;
  flex-shrink:0;
}
.flr{
  position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,#00ff64,transparent);
  box-shadow:0 0 8px rgba(0,255,100,0.5);
}
.faller{
  position:absolute;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:6px;
}
.fw{
  font-size:16px;font-weight:700;padding:10px 18px;
  border:2px solid #00ff64;border-radius:6px;
  color:#fff;text-align:center;min-width:120px;white-space:nowrap;
  background:rgba(0,35,18,0.88);
  box-shadow:0 0 16px rgba(0,255,100,0.4),inset 0 0 12px rgba(0,255,100,0.08);
  text-shadow:0 0 10px rgba(255,255,255,0.4);
}
.fw.ok {border-color:#00ffaa;box-shadow:0 0 24px rgba(0,255,170,0.7);color:#aaffdd}
.fw.bad{border-color:#ff4466;box-shadow:0 0 24px rgba(255,68,102,0.8);color:#ff99aa}
.fcn{font-size:10px;color:rgba(180,255,190,0.85);font-family:'Noto Serif SC',serif;text-align:center;max-width:130px;line-height:1.4}
.round-hint{font-size:9px;color:rgba(255,220,80,0.75);text-align:center;letter-spacing:.5px}
.ftbar{width:4px;height:60px;background:rgba(0,255,100,0.15);border-radius:2px;overflow:hidden}
.ftfill{width:100%;background:linear-gradient(180deg,#00ff64 0%,#ffcc00 60%,#ff4466 100%);transform-origin:top}

/* saved chips at bottom of fall zone */
.sv-list{position:absolute;bottom:10px;left:6px;right:6px;display:flex;flex-wrap:wrap;gap:3px;justify-content:center}
.sv-chip{font-size:9px;padding:2px 5px;border:1px solid rgba(0,255,100,0.35);border-radius:10px;color:rgba(0,255,100,0.7)}

/* banner */
.banner{position:absolute;left:50%;transform:translateX(-50%);top:44%;font-size:13px;font-weight:700;padding:7px 20px;border-radius:6px;white-space:nowrap;z-index:40;animation:bpop .3s ease}
.banner.ok  {background:rgba(0,255,100,0.93);color:#001a0a}
.banner.fail{background:rgba(255,68,102,0.93);color:#fff}
@keyframes bpop{from{transform:translateX(-50%) scale(.6);opacity:0}to{transform:translateX(-50%) scale(1);opacity:1}}

/* shards */
.shard{position:absolute;border-radius:1px;animation:sfx .75s ease-out forwards}
@keyframes sfx{0%{opacity:1;transform:translate(0,0) rotate(0deg) scale(1)}100%{opacity:0;transform:var(--tx) rotate(var(--rot)) scale(.1)}}

/* answer reveal overlay */
.ans-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:60;pointer-events:none;background:rgba(0,5,3,0.62);animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.ans-box{background:rgba(0,14,8,0.97);border:1.5px solid rgba(0,255,100,0.7);border-radius:10px;padding:16px 20px;max-width:88%;box-shadow:0 0 32px rgba(0,255,100,0.3);animation:popIn .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.ans-label{font-size:9px;color:rgba(0,255,100,0.6);letter-spacing:2px;margin-bottom:8px}
.ans-word{font-size:15px;font-weight:700;color:#00ff64;margin-bottom:4px}
.ans-cn{font-size:11px;color:rgba(180,255,190,0.9);font-family:'Noto Serif SC',serif;margin-bottom:10px}
.ans-chips{display:flex;flex-wrap:wrap;gap:5px}
.ans-chip{font-size:10px;font-weight:700;padding:3px 9px;background:rgba(0,255,100,0.18);border:1px solid rgba(0,255,100,0.55);border-radius:12px;color:#00ffaa;text-shadow:0 0 6px rgba(0,255,170,0.5)}

/* ── OPTIONS ZONE (right 60%): SINGLE COLUMN ── */
.oz{
  flex:1;
  display:flex;
  flex-direction:column;       /* ← vertical stack */
  gap:8px;
  padding:14px 16px;
  overflow-y:auto;             /* scroll if needed on small viewports */

}

/* ── OPTION BUTTON: full-width single column ── */
.ob{
  width:100%;                  /* fill the column */
  padding:14px 20px;           /* taller hit area */

  background:#0d2e1a;

  letter-spacing:.3px;
  text-shadow:0 0 8px rgba(255,255,255,0.3);

}
.ob:hover:not(:disabled){
  border-color:#00ff64;background:#173d22;
  color:#fff;box-shadow:0 0 12px rgba(0,255,100,0.4);

}
.ob.sel{
  border-color:#00ffdd;background:#0e3d30;color:#00ffdd;
  box-shadow:0 0 14px rgba(0,255,220,0.5);
  text-shadow:0 0 10px rgba(0,255,220,0.7);
  transform:translateX(3px);
}
.ob.cor{
  border-color:#00ffaa;background:#0a3825;color:#00ffaa;
  box-shadow:0 0 18px rgba(0,255,170,0.6);

}
.ob.wrg{
  border-color:#ff4466;background:#3d0a14;color:#ff9aaa;
  box-shadow:0 0 14px rgba(255,68,102,0.5);

.ob.mis{
  border-color:#ffcc00;background:#3d3000;color:#ffdd44;

  from{box-shadow:0 0 8px rgba(255,200,0,0.3)}

/* ── CONFIRM BUTTON ── */
.cfm{
  width:100%;
  margin-top:6px;padding:14px 20px;flex-shrink:0;
  border:1.5px solid rgba(0,255,100,0.75);
  background:#0d2e1a;color:#00ff64;
  font-family:'Space Mono',monospace;font-size:13px;font-weight:700;
  border-radius:8px;cursor:pointer;letter-spacing:1.5px;
  transition:background .2s,box-shadow .2s,opacity .2s;

}
.cfm:hover:not(:disabled){background:#173d22;box-shadow:0 0 18px rgba(0,255,100,0.45)}
.cfm:disabled{opacity:0.38;cursor:default}
.cfm.ready{
  border-color:#00ffaa;background:#0e3d28;color:#00ffaa;

}
@keyframes breathe{
  0%,100%{box-shadow:0 0 8px rgba(0,255,170,0.35),inset 0 0 10px rgba(0,255,170,0.05)}

}
.cfm-sub{font-size:10px;opacity:.6;font-weight:400;display:block;margin-top:3px;letter-spacing:0}

/* ── VAULT ── */
.vault{
  border-top:1px solid rgba(0,255,100,0.18);
  padding:7px 14px;font-size:10px;color:rgba(0,255,100,0.55);
  display:flex;align-items:center;gap:7px;flex-wrap:wrap;
  position:relative;z-index:10;
}

/* ── START / END ── */
.startsc,.endsc{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:630px;gap:18px;position:relative;z-index:10;
}
.endsc{text-align:center}
.title-big{font-size:22px;font-weight:700;color:#00ff64;letter-spacing:3px;text-align:center;line-height:1.4;text-shadow:0 0 20px rgba(0,255,100,0.5)}
.stbtn{
  padding:12px 32px;border:2px solid #00ff64;
  background:rgba(0,255,100,0.1);color:#00ff64;
  font-family:'Space Mono',monospace;font-size:14px;font-weight:700;
  border-radius:6px;cursor:pointer;letter-spacing:2px;
  transition:all .2s;box-shadow:0 0 20px rgba(0,255,100,0.2);
}
.stbtn:hover{background:rgba(0,255,100,0.2);box-shadow:0 0 30px rgba(0,255,100,0.4)}
.fscore{font-size:52px;font-weight:700;color:#00ff64;text-shadow:0 0 30px rgba(0,255,100,0.6)}
.pring{position:absolute;width:60px;height:60px;border:1px solid rgba(0,255,100,0.3);border-radius:50%;animation:po 2s ease-out infinite}
@keyframes po{0%{transform:translate(-50%,-50%) scale(.5);opacity:.8}100%{transform:translate(-50%,-50%) scale(2.5);opacity:0}}
.legend{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:2px}
.leg{font-size:9px;display:flex;align-items:center;gap:4px;color:rgba(220,255,220,0.65)}
.legdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── MOBILE: stack vertically ── */
@media(max-width:580px){
  .body{flex-direction:column}
  .fz{
    width:100%;min-height:auto;height:230px;
    border-right:none;border-bottom:1px solid rgba(0,255,100,0.18);
    flex-shrink:0;
  }
  .oz{
    padding:10px 12px;gap:7px;
    max-height:340px;         /* limit height, allow scroll */
    overflow-y:auto;
    justify-content:flex-start;
  }
  .ob{font-size:12px;padding:12px 16px;min-height:46px}
  .cfm{font-size:12px;padding:12px 16px}
}
</style>

<body>
<div id="root"></div>
<script>
const{useState,useEffect,useRef,useCallback,useMemo}=React;

/* ═══════════════════════════════
   GAME DATA – 雅思真经 538 第一类
   ═══════════════════════════════ */
const WORDS=[
  {word:'resemble',     cn:'类似于',              correct:['like','look like','be similar to']},
  {word:'recognize',    cn:'认识 / 承认',          correct:['perceive','acknowledge','realize','appreciate','admit','identify','comprehend','understand','know']},
  {word:'adjust',       cn:'调整',                correct:['change','modify','shift','alter']},
  {word:'approach',     cn:'方法',                correct:['method','way']},
  {word:'fundamental',  cn:'基础的',              correct:['rudimentary','preliminary','basic']},
  {word:'rely on',      cn:'依赖',                correct:['depend on']},
  {word:'domestic',     cn:'国内的',              correct:['home','local','national']},
  {word:'measure',      cn:'测量 / 评估',          correct:['calculate','assess','evaluate']},
  {word:'trait',        cn:'特征',                correct:['characteristic','feature','property']},
  {word:'coin',         cn:'创造（新词）',         correct:['first used','invent']},
  {word:'artificial',   cn:'人工的',              correct:['synthetic','man-made']},
  {word:'prompt',       cn:'促使 / 立即',          correct:['initiate','immediately']},
  {word:'exchange',     cn:'交换 / 应用',          correct:['share','apply A to B']},
  {word:'underlie',     cn:'基于 / 支撑',          correct:['based on','ground','root']},
  {word:'ignore',       cn:'忽视',                correct:['neglect','overlook','underestimate']},
  {word:'fertiliser',   cn:'化肥',                correct:['chemical','toxic','unnatural']},
  {word:'that*',        cn:'指代词（that）',       correct:['this','it','they','those','these','such']},
  {word:'and*',         cn:'连接词（and）',        correct:['or','as well as','both...and','not only...but also...','other than','in addition','besides']},
  {word:'rather than*', cn:'转折（rather than）',  correct:['but','yet','however','whereas','nonetheless','nevertheless','although','notwithstanding','though','instead']},
  {word:'thanks to*',   cn:'原因（thanks to）',    correct:['stem from','derive','owing to','due to','according to','because of','on account of','as a result of','leading to','because','since','for','in that','as','therefore','hence']},
];
const ALL_POOL=Array.from(new Set(WORDS.flatMap(w=>w.correct)));

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]]}return b}

/* Returns {options[], roundCorrect[]}
   roundCorrect = subset of correct[] that appear on screen this round
   Judgment only compares against roundCorrect – NOT the full correct[] array */
function buildOptions(wd,total=6){
  const maxR=Math.min(wd.correct.length,3);
  const nR=Math.floor(Math.random()*maxR)+1;
  const roundCorrect=shuffle(wd.correct).slice(0,nR);
  const wrongs=shuffle(ALL_POOL.filter(o=>!wd.correct.includes(o)));
  const options=shuffle([...roundCorrect,...wrongs.slice(0,total-nR)]);
  return{options,roundCorrect};
}

/* ═══════════════════
   WEB AUDIO ENGINE
   ═══════════════════ */
class AudioEngine{
  constructor(){this.ctx=null;this.muted=false;this._bgmRunning=false;this._bgmTimer=null;this.bgmGain=null;this.masterGain=null}
  _init(){
    if(this.ctx)return;
    this.ctx=new(window.AudioContext||window.webkitAudioContext)();
    this.masterGain=this.ctx.createGain();
    this.masterGain.gain.value=1;
    this.masterGain.connect(this.ctx.destination);
  }
  _resume(){if(this.ctx&&this.ctx.state==='suspended')this.ctx.resume()}
  _tone(freq,type,startAt,dur,vol=0.18){
    if(this.muted)return;
    this._init();this._resume();
    const o=this.ctx.createOscillator();
    const g=this.ctx.createGain();
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(0,startAt);
    g.gain.linearRampToValueAtTime(vol,startAt+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,startAt+dur);
    o.connect(g);g.connect(this.masterGain);
    o.start(startAt);o.stop(startAt+dur+0.01);
  }
  playSuccess(){
    this._init();this._resume();
    const t=this.ctx.currentTime;
    [[523,0],[659,0.1],[784,0.2],[1047,0.32]].forEach(([f,dt])=>{
      this._tone(f,'sine',t+dt,0.25,0.2);
      this._tone(f*2,'sine',t+dt,0.18,0.05);
    });
  }
  playFailure(){
    this._init();this._resume();
    const t=this.ctx.currentTime;
    [[220,0],[185,0.04],[155,0.08]].forEach(([f,dt])=>this._tone(f,'sawtooth',t+dt,0.35,0.22));
    const bufSize=this.ctx.sampleRate*0.15;
    const buf=this.ctx.createBuffer(1,bufSize,this.ctx.sampleRate);
    const data=buf.getChannelData(0);
    for(let i=0;i<bufSize;i++)data[i]=(Math.random()*2-1)*Math.pow(1-i/bufSize,1.5);
    const src=this.ctx.createBufferSource();
    src.buffer=buf;
    const g=this.ctx.createGain();
    g.gain.setValueAtTime(this.muted?0:0.4,t);
    g.gain.exponentialRampToValueAtTime(0.0001,t+0.15);
    src.connect(g);g.connect(this.masterGain);
    src.start(t);
  }
  playClick(){
    this._init();this._resume();
    this._tone(880,'sine',this.ctx.currentTime,0.06,0.08);
  }
  startBGM(){
    if(this._bgmRunning)return;
    this._init();this._resume();
    this._bgmRunning=true;
    this.bgmGain=this.ctx.createGain();
    this.bgmGain.gain.value=this.muted?0:0.1;
    this.bgmGain.connect(this.masterGain);
    const scale=[261,294,330,392,440,523,587,659];
    let step=0;
    const interval=0.19;
    const loop=()=>{
      if(!this._bgmRunning)return;
      const t=this.ctx.currentTime;
      const freq=scale[step%scale.length]*(step%8===4?2:1);
      const o=this.ctx.createOscillator();
      const g=this.ctx.createGain();
      o.type='triangle';o.frequency.value=freq;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(1,t+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,t+interval*0.82);
      o.connect(g);g.connect(this.bgmGain);
      o.start(t);o.stop(t+interval);
      step++;
      this._bgmTimer=setTimeout(loop,(interval*1000)-10);
    };
    loop();
  }
  stopBGM(){this._bgmRunning=false;if(this._bgmTimer)clearTimeout(this._bgmTimer)}
  setMute(m){
    this.muted=m;
    if(this.bgmGain){
      const t=this.ctx?this.ctx.currentTime:0;
      this.bgmGain.gain.cancelScheduledValues(t);
      this.bgmGain.gain.setTargetAtTime(m?0:0.1,t,0.05);
    }
  }
}
const audio=new AudioEngine();

/* ── SHARDS ── */
function Shards({cx,cy}){
  const pieces=Array.from({length:14},(_,i)=>{
    const angle=(i/14)*360+Math.random()*15;
    const dist=25+Math.random()*60;
    const tx=`translateX(${Math.cos(angle*Math.PI/180)*dist}px) translateY(${Math.sin(angle*Math.PI/180)*dist}px)`;
    const colors=['#ff4466','#ff6688','#ff2244','#ff99aa','#dd2255','#ff5577'];
    return{tx,rot:`${Math.random()*400}deg`,delay:`${Math.random()*0.08}s`,bg:colors[i%colors.length],w:5+(0|Math.random()*7),h:3+(0|Math.random()*6)};
  });
  return React.createElement('div',{style:{position:'absolute',left:cx,top:cy,zIndex:80,pointerEvents:'none'}},
    pieces.map((s,i)=>React.createElement('div',{key:i,className:'shard',style:{'--tx':s.tx,'--rot':s.rot,animationDelay:s.delay,background:s.bg,left:0,top:0,width:s.w,height:s.h}}))
  );
}

/* ── ANSWER REVEAL ── */
function AnsReveal({wd,roundCorrect}){
  if(!wd)return null;
  return React.createElement('div',{className:'ans-overlay'},
    React.createElement('div',{className:'ans-box'},
      React.createElement('div',{className:'ans-label'},'✦ correct answers this round'),
      React.createElement('div',{className:'ans-word'},wd.word),
      React.createElement('div',{className:'ans-cn'},wd.cn),
      React.createElement('div',{className:'ans-chips'},
        roundCorrect.map(c=>React.createElement('span',{key:c,className:'ans-chip'},c))
      )
    )
  );
}

/* ── CONSTANTS ── */
const FALL_DURATION=11000;
const FALL_PX=460;
const REVEAL_MS=1800;

/* ═══════════════════
   MAIN GAME
   ═══════════════════ */
function Game(){
  const[phase,setPhase]=useState('start');
  const[round,setRound]=useState(0);
  const[wd,setWd]=useState(null);
  const[opts,setOpts]=useState([]);
  const[roundCorrect,setRoundCorrect]=useState([]);
  const[sel,setSel]=useState([]);
  const[fallerY,setFallerY]=useState(0);
  const[result,setResult]=useState(null);
  const[saved,setSaved]=useState([]);
  const[lives,setLives]=useState(3);
  const[banner,setBanner]=useState(null);
  const[shards,setShards]=useState([]);
  const[ostates,setOstates]=useState({});
  const[showReveal,setShowReveal]=useState(false);
  const[combo,setCombo]=useState(0);
  const[muted,setMuted]=useState(false);

  const animRef=useRef(null);
  const t0=useRef(null);
  const judgedR=useRef(false);
  const selRef=useRef([]);
  const wdRef=useRef(null);
  const optsRef=useRef([]);
  const rcRef=useRef([]);
  selRef.current=sel;wdRef.current=wd;optsRef.current=opts;rcRef.current=roundCorrect;

  /* All round-correct options selected (and nothing extra) → breathing confirm */
  const allReady=useMemo(()=>{
    if(!roundCorrect.length||result)return false;
    return roundCorrect.every(c=>sel.includes(c))&&sel.every(c=>roundCorrect.includes(c));
  },[sel,roundCorrect,result]);

  const startRound=useCallback((idx)=>{
    if(idx>=WORDS.length){setPhase('end');return}
    const w=WORDS[idx];
    const{options,roundCorrect:rc}=buildOptions(w,6);
    setWd(w);setOpts(options);setRoundCorrect(rc);
    setSel([]);setFallerY(0);
    setResult(null);setBanner(null);setShards([]);setOstates({});setShowReveal(false);
    judgedR.current=false;t0.current=null;
  },[]);

  useEffect(()=>{
    if(phase==='playing'){startRound(round);audio.startBGM();}
    if(phase==='end')audio.stopBGM();
  },[phase,round]);

  /* fall loop */
  useEffect(()=>{
    if(phase!=='playing'||result)return;
    let dead=false;
    const tick=(ts)=>{
      if(dead)return;
      if(!t0.current)t0.current=ts;
      const pct=Math.min((ts-t0.current)/FALL_DURATION,1);
      setFallerY(pct*FALL_PX);
      if(pct>=1&&!judgedR.current){doJudge(selRef.current,wdRef.current,optsRef.current,rcRef.current);return}
      animRef.current=requestAnimationFrame(tick);
    };
    animRef.current=requestAnimationFrame(tick);
    return()=>{dead=true;if(animRef.current)cancelAnimationFrame(animRef.current)};
  },[phase,result,round]);

  /* ══════════════════════════════════════════════
     JUDGE: win iff sel === roundCorrect (subset match)
     ══════════════════════════════════════════════ */
  function doJudge(curSel,curWd,curOpts,curRC){
    if(judgedR.current)return;
    judgedR.current=true;
    if(animRef.current)cancelAnimationFrame(animRef.current);

    const win=
      curRC.every(c=>curSel.includes(c))&&
      curSel.every(c=>curRC.includes(c));

    const ns={};
    curOpts.forEach(o=>{
      const isRight=curRC.includes(o);
      const picked=curSel.includes(o);
      if(isRight&&picked)    ns[o]='cor';
      else if(!isRight&&picked) ns[o]='wrg';
      else if(isRight&&!picked) ns[o]='mis';
    });
    setOstates(ns);

    if(win){
      setResult('ok');setSaved(s=>[...s,curWd.word]);setCombo(c=>c+1);setBanner('✓  SAVED!');
      audio.playSuccess();
      setTimeout(()=>advance(),1500);
    }else{
      setResult('fail');setCombo(0);setBanner('✗  FAILED');
      audio.playFailure();
      setShards([{id:Date.now()}]);
      setTimeout(()=>setShowReveal(true),380);
      setLives(l=>{const nl=l-1;if(nl<=0)setTimeout(()=>setPhase('end'),REVEAL_MS+700);return nl});
      setTimeout(()=>advance(),REVEAL_MS+900);
    }
  }

  function advance(){
    setRound(r=>{const n=r+1;if(n>=WORDS.length)setPhase('end');else startRound(n);return n});
  }

  function toggle(opt){
    if(result)return;
    audio.playClick();
    setSel(s=>s.includes(opt)?s.filter(x=>x!==opt):[...s,opt]);
  }
  function confirm(){
    if(result||!wd)return;
    doJudge([...sel],wd,opts,roundCorrect);
  }
  function toggleMute(){
    const next=!muted;setMuted(next);audio.setMute(next);
  }

  const pct=Math.round((saved.length/WORDS.length)*100);
  const timerPct=fallerY/FALL_PX;

  /* ── START ── */
  if(phase==='start')return React.createElement('div',{className:'gw'},
    React.createElement('div',{className:'scan'}),
    React.createElement('div',{className:'startsc'},
      React.createElement('div',{style:{position:'relative',width:60,height:60}},
        React.createElement('div',{className:'pring',style:{position:'absolute',left:'50%',top:'50%'}}),
        React.createElement('div',{className:'pring',style:{position:'absolute',left:'50%',top:'50%',animationDelay:'.7s'}}),
        React.createElement('div',{style:{position:'absolute',left:'50%',top:'50%',transform:'translate(-50%,-50%)',width:18,height:18,background:'#00ff64',borderRadius:'50%',boxShadow:'0 0 18px #00ff64'}})
      ),
      React.createElement('div',{className:'title-big'},
        'SAVE WORDS',React.createElement('br'),
        React.createElement('span',{style:{fontSize:11,color:'rgba(0,255,100,0.55)',letterSpacing:2,display:'block',marginTop:4}},'雅思真经 538 考点词挑战')
      ),
      React.createElement('div',{style:{fontSize:10,color:'rgba(210,255,210,0.65)',textAlign:'center',lineHeight:2.2}},
        '⚡ 单词下落时选出本轮所有正确同义词',React.createElement('br'),
        '⚡ 只需选中屏幕里出现的正确项即可',React.createElement('br'),
        '⚡ CONFIRM 按钮发光 = 可以提交了'
      ),
      React.createElement('div',{className:'legend'},
        React.createElement('div',{className:'leg'},React.createElement('div',{className:'legdot',style:{background:'#00ffaa'}}),React.createElement('span','选对')),
        React.createElement('div',{className:'leg'},React.createElement('div',{className:'legdot',style:{background:'#ff4466'}}),React.createElement('span','选错')),
        React.createElement('div',{className:'leg'},React.createElement('div',{className:'legdot',style:{background:'#ffcc00'}}),React.createElement('span','漏选（闪烁）'))
      ),
      React.createElement('button',{className:'stbtn',onClick:()=>{audio._init();setPhase('playing')}},'START GAME'),
      React.createElement('div',{style:{fontSize:9,color:'rgba(0,255,100,0.35)'}},'20 rounds · 3 lives · ~11s each')
    )
  );

  /* ── END ── */
  if(phase==='end')return React.createElement('div',{className:'gw'},
    React.createElement('div',{className:'scan'}),
    React.createElement('div',{className:'endsc'},
      React.createElement('div',{style:{fontSize:12,color:'rgba(0,255,100,0.55)',letterSpacing:2}},'GAME OVER'),
      React.createElement('div',{className:'fscore'},saved.length),
      React.createElement('div',{style:{fontSize:12,color:'rgba(255,255,255,0.5)'}},`/ ${WORDS.length} WORDS SAVED`),
      saved.length>0&&React.createElement('div',{style:{display:'flex',flexWrap:'wrap',gap:4,justifyContent:'center',maxWidth:360,marginTop:6}},
        saved.map(w=>React.createElement('span',{key:w,style:{fontSize:9,padding:'2px 6px',border:'1px solid rgba(0,255,100,0.4)',borderRadius:10,color:'rgba(0,255,100,0.75)'}},w))
      ),
      React.createElement('div',{style:{fontSize:11,color:'rgba(255,255,255,0.45)',marginTop:4}},
        saved.length===WORDS.length?'🏆 PERFECT! 全部拯救！':saved.length>15?'⭐ EXCELLENT!':saved.length>10?'✓ GOOD! 继续努力！':'再接再厉，加油！'
      ),
      React.createElement('button',{className:'stbtn',style:{marginTop:12},
        onClick:()=>{setSaved([]);setLives(3);setRound(0);setCombo(0);setPhase('playing')}},'PLAY AGAIN')
    )
  );

  /* ── PLAYING ── */
  return React.createElement('div',{className:'gw'},
    React.createElement('div',{className:'scan'}),

    /* header */
    React.createElement('div',{className:'hdr'},
      React.createElement('div',{className:'logo'},'SAVE WORDS'),
      React.createElement('div',{className:'spill'},`${saved.length}/${WORDS.length}`),
      React.createElement('div',{className:'pgw'},React.createElement('div',{className:'pgf',style:{width:`${pct}%`}})),
      React.createElement('div',{className:'hvs'},[0,1,2].map(i=>React.createElement('span',{key:i,className:'ht',style:{opacity:i<lives?1:0.18}},'♥'))),
      combo>1&&React.createElement('div',{style:{fontSize:10,color:'#ffcc00',textShadow:'0 0 8px rgba(255,200,0,0.7)'}},`COMBO ×${combo}`),
      React.createElement('button',{className:'mute-btn',onClick:toggleMute,title:muted?'开启声音':'静音'},muted?'🔇':'🔊')
    ),

    /* body */
    React.createElement('div',{className:'body'},

      /* ── fall zone (left) ── */
      React.createElement('div',{className:'fz'},
        wd&&React.createElement('div',{className:'faller',style:{top:`${fallerY}px`}},
          React.createElement('div',{className:`fw ${result==='ok'?'ok':result==='fail'?'bad':''}`},wd.word),
          React.createElement('div',{className:'fcn'},wd.cn),
          !result&&React.createElement('div',{className:'round-hint'},`需选 ${roundCorrect.length} 项`),
          React.createElement('div',{className:'ftbar'},React.createElement('div',{className:'ftfill',style:{height:`${timerPct*100}%`}}))
        ),
        banner&&React.createElement('div',{className:`banner ${result==='ok'?'ok':'fail'}`},banner),
        showReveal&&React.createElement(AnsReveal,{wd,roundCorrect}),
        shards.map(s=>React.createElement(Shards,{key:s.id,cx:'42%',cy:'42%'})),
        React.createElement('div',{className:'flr'}),
        React.createElement('div',{className:'sv-list'},saved.slice(-4).map(w=>React.createElement('span',{key:w,className:'sv-chip'},w)))
      ),

      /* ── options zone (right): single column ── */
      React.createElement('div',{className:'oz'},
        opts.map(opt=>{
          const st=ostates[opt];
          const isSel=sel.includes(opt);
          return React.createElement('button',{
            key:opt,
            className:`ob ${st||(isSel?'sel':'')}`,
            onClick:()=>toggle(opt),
            disabled:!!result,
          },opt);
        }),

        /* CONFIRM */
        React.createElement('button',{
          className:`cfm${allReady?' ready':''}`,
          onClick:confirm,
          disabled:!!result||sel.length===0,
        },
          allReady
            ? React.createElement('span',null,
                '✦ CONFIRM ▶',
                React.createElement('span',{className:'cfm-sub'},'全部选对 — 点击提交！')
              )
            : React.createElement('span',null,
                'CONFIRM ▶',
                React.createElement('span',{className:'cfm-sub'},`已选 ${sel.length} / 需选 ${roundCorrect.length}`)
              )
        )
      )
    ),

    /* vault */
    React.createElement('div',{className:'vault'},
      React.createElement('span',{style:{color:'rgba(0,255,100,0.4)',marginRight:4}},'VAULT:'),
      saved.slice(-9).map(w=>
        React.createElement('span',{key:w,style:{fontSize:9,padding:'2px 6px',border:'1px solid rgba(0,255,100,0.3)',borderRadius:10,color:'rgba(0,255,100,0.65)'}},w)
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(Game));
</script>
</body>
</html>
